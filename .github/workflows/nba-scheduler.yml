name: NBA Data Scheduler

on:
  schedule:
    - cron: '0 7 * * *'   # 07:00 UTC = 09:00 Israel (fetch today's games)
    - cron: '0 17 * * *'  # 17:00 UTC = 19:00 Israel (update results and scores)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  run-script:
    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      PYTHONUTF8: "1"

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NBA data script
        run: python scripts/nba_playoffs_to_supabase.py
